financial_services:
  tables:
    accounts:
      domain_label:

      entry_count:
      
      concept_definition:

      distinctness_criteria:
      
      domain_boundary_xamples:
    
      prompt: |-
        You are generating a controlled vocabulary, not sample data.

        Task: Produce a list of distinct financial account concepts.

        Output requirements:

        Return valid JSON only
        Format: an array of objects with exactly two fields: "name" and "description"
        Generate 120 entries
        Each entry must represent a unique account concept (e.g., account type, ownership model, status, or structural variant)
        Do not generate specific instances (no IDs, no numbers, no dates, no people, no balances)
        Avoid synonyms or near-duplicates
        Avoid trivial variants (e.g., "basic checking account" vs "standard checking account")
        Keep names concise (2-5 words)
        Descriptions: 1 sentence, precise and non-overlapping
        Use standard financial terminology

        Quality constraints:

        Concepts must be meaningfully distinct in function or structure
        No repetition or rewording of the same idea
        Stay within realistic financial services domain (retail, business, payments, digital wallets, etc.)

        Output format example:

        [
        {
        "name": "Checking Account",
        "description": "A deposit account designed for frequent transactions such as payments, withdrawals, and transfers."
        }
        ]

        Now generate the full list.


    transactions:
      prompt: |-
        You are generating a controlled vocabulary, not sample data.

        Task: Produce a list of distinct financial transaction concepts.

        Output requirements:

        Return valid JSON only
        Format: an array of objects with exactly two fields: "name" and "description"
        Generate 150 entries
        Each entry must represent a unique transaction concept (e.g., payment type, transfer type, funding mechanism, channel-specific transaction, or settlement form)
        Do not generate specific instances (no IDs, no numbers, no dates, no people, no balances)
        Avoid synonyms or near-duplicates
        Avoid trivial variants (e.g., "online payment" vs "internet payment")
        Keep names concise (2-5 words)
        Descriptions: 1 sentence, precise and non-overlapping
        Use standard financial terminology

        Quality constraints:

        Concepts must be meaningfully distinct in function, flow, or mechanism
        No repetition or rewording of the same idea
        Stay within realistic financial services domain (retail, business, payments, cards, transfers, etc.)

        Output format example:

        [
        {
        "name": "Card Purchase",
        "description": "A transaction where a payment card is used to pay a merchant for goods or services."
        }
        ]

        Now generate the full list.


    payment_events:
      prompt: |-
        Events describing the lifecycle of a payment, including initiation, authorization,
        routing, clearing, settlement, reversals, chargebacks, and failures across payment
        rails such as card networks, ACH, wires, and real-time payments.

    lending_lifecycle_events:
      prompt: |-
        Events describing the lifecycle of a loan or credit product, including application,
        underwriting, approval, origination, disbursement, repayment, delinquency,
        restructuring, and closure.

    customer_profiles:
      prompt: |-
        You are generating a controlled vocabulary, not sample data.

        Task: Produce a list of distinct payment lifecycle event concepts.

        Output requirements:

        Return valid JSON only
        Format: an array of objects with exactly two fields: "name" and "description"
        Generate 120 entries
        Each entry must represent a unique payment event concept (e.g., initiation, authorization, routing, clearing, settlement, reversal, exception, or failure stage across payment rails)
        Do not generate specific instances (no IDs, no numbers, no dates, no people, no balances)
        Avoid synonyms or near-duplicates
        Avoid trivial variants (e.g., "payment approval" vs "approved payment")
        Keep names concise (2–5 words)
        Descriptions: 1 sentence, precise and non-overlapping
        Use standard financial terminology

        Quality constraints:

        Concepts must be meaningfully distinct in lifecycle stage, processing step, or outcome
        No repetition or rewording of the same idea
        Stay within realistic payment systems domain (cards, ACH, wires, real-time payments, wallets, etc.)

        Output format example:

        [
        {
        "name": "Payment Authorization",
        "description": "An event where a payment request is approved or declined by the issuing institution based on available funds and risk checks."
        }
        ]

        Now generate the full list.

    fraud_risk_events:
      prompt: |-
        Events related to fraud detection, risk scoring, suspicious activity, transaction
        monitoring alerts, chargebacks, identity verification outcomes, and other signals
        used to assess and mitigate financial crime.

    compliance_policies:
      prompt: |-
        Policies, rules, and regulatory obligations governing financial services operations,
        including KYC/AML requirements, sanctions screening, transaction monitoring,
        data retention, consumer protection, and reporting obligations.

    client_requests:
      prompt: |-
        Requests, inquiries, or instructions from customers related to account access,
        payments, disputes, card management, loan servicing, onboarding, documentation,
        or issue resolution.

    operational_incidents:
      prompt: |-
        Operational problems, outages, failed transactions, reconciliation breaks,
        processing errors, system incidents, or workflow disruptions affecting financial
        services operations.

    product_configurations:
      prompt: |-
        Definitions and configurations of financial products, including account terms,
        fees, interest rates, limits, rewards programs, loan terms, and eligibility rules
        governing how products are offered and managed.


capital_markets:
  tables:
    instruments:
      prompt: |-
        Information about tradable financial instruments or securities, including identifiers,
        product type, issuer, currency, maturity, coupon, strike, exchange, listing venue,
        and other static reference attributes used to define the instrument.

    trade_lifecycle_events:
      prompt: |-
        Events describing the progression of an order or trade through its lifecycle, including
        order creation, routing, execution, allocation, confirmation, clearing, settlement,
        amendment, cancellation, and exception handling.

    market_events:
      prompt: |-
        External events that affect market conditions or specific issuers, instruments, or sectors,
        including earnings releases, economic data, central bank announcements, rating changes,
        volatility shocks, trading halts, corporate actions, and other price-moving developments.

    research_commentary:
      prompt: |-
        Analyst-produced or strategist-produced commentary, recommendations, forecasts, price targets,
        thematic views, investment theses, and written interpretations of companies, sectors,
        instruments, or macroeconomic conditions.

    compliance_policies:
      prompt: |-
        Policies, rules, controls, and regulatory obligations governing trading activity, communications,
        disclosures, surveillance, recordkeeping, suitability, restricted lists, information barriers,
        best execution, and other compliance requirements in capital markets operations.

    client_requests:
      prompt: |-
        Requests, inquiries, or instructions from clients related to trading, execution, reporting,
        onboarding, account servicing, portfolio information, settlement status, documentation,
        or issue resolution.

    operational_incidents:
      prompt: |-
        Operational problems, breaks, exceptions, outages, failed processes, reconciliation issues,
        settlement failures, booking errors, system incidents, or workflow disruptions affecting
        capital markets activities.

cloud_infrastructure:
  tables:
    compute_resources:
      prompt: |-
        Information about virtualized or physical compute resources, including virtual machines,
        containers, serverless functions, clusters, instance types, regions, availability zones,
        and configurations used to run applications and workloads.

    storage_resources:
      prompt: |-
        Information about data storage systems, including object storage, block storage,
        file systems, databases, data warehouses, and associated attributes such as capacity,
        durability, replication, access patterns, and lifecycle policies.

    networking_components:
      prompt: |-
        Information about network infrastructure and connectivity, including virtual networks,
        subnets, load balancers, gateways, DNS, IP addressing, routing rules, firewalls,
        and traffic management configurations.

    deployment_events:
      prompt: |-
        Events related to the provisioning, deployment, scaling, and updating of infrastructure
        and applications, including instance launches, container deployments, configuration
        changes, autoscaling events, and rollout or rollback actions.

    observability_metrics:
      prompt: |-
        Metrics, logs, and traces used to monitor system health and performance, including
        CPU and memory utilization, latency, throughput, error rates, log streams, and
        distributed tracing data.

    access_identity_controls:
      prompt: |-
        Definitions and events related to identity and access management, including users,
        roles, permissions, policies, authentication events, authorization decisions,
        and service-to-service identity configurations.

    cost_usage_records:
      prompt: |-
        Records of resource consumption and associated costs, including usage metrics,
        billing data, pricing tiers, cost allocation tags, and optimization signals for
        infrastructure efficiency.

    security_events:
      prompt: |-
        Events related to infrastructure security, including intrusion detection,
        vulnerability findings, configuration violations, access anomalies,
        encryption status, and incident response activities.

    configuration_state:
      prompt: |-
        Snapshots or definitions of infrastructure configuration, including infrastructure-as-code,
        resource specifications, environment variables, versioned configurations,
        and system state representations.

    operational_incidents:
      prompt: |-
        Operational issues affecting infrastructure availability or performance, including
        outages, degradation, failed deployments, resource exhaustion, networking failures,
        and other disruptions in cloud environments.
        

security_identity:
  tables:
    identities:
      prompt: |-
        Information about human users, service accounts, devices, and application identities,
        including identifiers, attributes, lifecycle state, group membership, and relationships
        used to represent actors in a security or identity system.

    credentials:
      prompt: |-
        Information about authentication factors and secrets, including passwords, keys,
        certificates, tokens, passkeys, and related metadata such as issuance, expiration,
        rotation status, and storage or binding characteristics.

    authentication_events:
      prompt: |-
        Events related to verifying identity, including login attempts, multi-factor challenges,
        token issuance, session establishment, federation flows, single sign-on events,
        and authentication successes or failures.

    authorization_policies:
      prompt: |-
        Policies, rules, and permissions governing access to systems, applications, data,
        and infrastructure, including roles, entitlements, privilege assignments,
        policy conditions, and access control decisions.

    access_events:
      prompt: |-
        Events recording access to systems, applications, resources, or data, including
        requests, approvals, denials, privilege escalations, session activity,
        and administrative actions performed by authenticated identities.

    directory_objects:
      prompt: |-
        Information about directory-based entities and organizational structure, including
        users, groups, roles, organizational units, domains, tenants, and identity provider
        metadata used to manage identities at scale.

    security_findings:
      prompt: |-
        Findings, alerts, or detected issues related to security posture, including
        vulnerabilities, misconfigurations, anomalous behavior, suspicious logins,
        exposed credentials, policy violations, and threat detections.

    device_posture:
      prompt: |-
        Information about the security state of endpoints and devices, including device identity,
        operating system version, management status, compliance checks, encryption status,
        patch levels, and trust signals used in access decisions.

    incident_response_events:
      prompt: |-
        Events related to the investigation, containment, remediation, and recovery of
        security incidents, including alert triage, case updates, response actions,
        evidence collection, and resolution status.

    compliance_policies:
      prompt: |-
        Policies, controls, and regulatory requirements governing identity, access,
        data protection, auditability, and security operations, including password standards,
        retention rules, access reviews, segregation of duties, and control attestations.


hardware_semiconductor:
  tables:
    hardware_components:
      prompt: |-
        Information about physical computing components, including processors (CPU, GPU),
        memory, storage devices, networking hardware, accelerators, and embedded systems,
        along with specifications such as performance characteristics, architecture,
        capacity, and form factor.

    semiconductor_products:
      prompt: |-
        Information about semiconductor devices and chips, including integrated circuits,
        fabrication technologies, process nodes, chip designs, and product families used
        in computing, networking, and electronic systems.

    manufacturing_processes:
      prompt: |-
        Information about semiconductor manufacturing and fabrication processes,
        including foundries, process technologies, yields, supply chain stages,
        and production lifecycle details.

    supply_chain_entities:
      prompt: |-
        Information about suppliers, manufacturers, distributors, and partners involved
        in the production and delivery of hardware and semiconductor products,
        including relationships, sourcing, and logistics.

    deployment_hardware:
      prompt: |-
        Information about deployed hardware systems, including servers, appliances,
        edge devices, data center equipment, and configurations used to support
        computing workloads.

    performance_metrics:
      prompt: |-
        Metrics related to hardware performance and efficiency, including throughput,
        latency, power consumption, thermal characteristics, utilization, and benchmarking data.

    firmware_software_interfaces:
      prompt: |-
        Information about low-level software interfaces to hardware, including firmware,
        drivers, runtime libraries, and APIs that enable interaction between hardware
        components and higher-level systems.

    operational_events:
      prompt: |-
        Events related to hardware lifecycle and operations, including provisioning,
        failures, maintenance, upgrades, diagnostics, and decommissioning.

    security_features:
      prompt: |-
        Hardware-level security capabilities and events, including secure enclaves,
        trusted execution environments, hardware root of trust, encryption modules,
        and firmware integrity checks.

    compliance_standards:
      prompt: |-
        Standards and certifications relevant to hardware and semiconductor systems,
        including safety, interoperability, environmental, and regulatory compliance.


media_gaming_platforms:
  tables:
    content_assets:
      prompt: |-
        Information about digital content, including video, audio, images, games,
        streams, and user-generated content, along with metadata such as title,
        creator, genre, format, duration, and rights ownership.

    user_profiles:
      prompt: |-
        Information about platform users, including identity, preferences,
        subscriptions, viewing or gameplay history, social connections,
        and engagement attributes.

    content_interactions:
      prompt: |-
        Events representing user interactions with content, including views,
        plays, likes, shares, comments, downloads, session activity,
        and gameplay actions.

    recommendation_signals:
      prompt: |-
        Data and signals used to personalize content discovery, including
        user behavior, preferences, collaborative filtering inputs,
        rankings, and recommendation outputs.

    monetization_events:
      prompt: |-
        Events related to revenue generation, including subscriptions,
        in-app purchases, ad impressions, ad clicks, virtual goods,
        and transaction records tied to content or gameplay.

    advertising_inventory:
      prompt: |-
        Information about ad placements and inventory, including slots,
        targeting parameters, campaign metadata, creatives, and delivery
        configurations within media or gaming environments.

    creator_management:
      prompt: |-
        Information about content creators, publishers, or studios,
        including profiles, content catalogs, revenue sharing terms,
        performance metrics, and partnership agreements.

    platform_moderation:
      prompt: |-
        Policies, actions, and events related to content moderation,
        including flagging, review workflows, removals, bans,
        community guidelines enforcement, and trust and safety operations.

    streaming_delivery:
      prompt: |-
        Information and events related to content distribution and delivery,
        including streaming sessions, buffering, bitrate adaptation,
        CDN usage, and playback performance metrics.

    operational_incidents:
      prompt: |-
        Operational issues affecting platform availability or user experience,
        including outages, latency issues, failed streams, service degradation,
        and system disruptions.



blockchain_crypto:
  tables:
    blockchain_networks:
      prompt: |-
        Information about blockchain networks and protocols, including mainnets,
        testnets, consensus mechanisms, validators, nodes, chain parameters,
        and network-level characteristics such as throughput, latency, and security models.

    digital_assets:
      prompt: |-
        Information about blockchain-based assets, including cryptocurrencies,
        tokens (fungible and non-fungible), smart contract addresses, token standards,
        supply metrics, and ownership or transfer attributes.

    wallets_accounts:
      prompt: |-
        Information about blockchain wallets and accounts, including public/private key pairs,
        addresses, custody models (self-custody, custodial), account balances,
        and wallet metadata.

    transaction_events:
      prompt: |-
        Events representing blockchain transactions, including transfers of assets,
        contract interactions, gas usage, transaction status, confirmations,
        and block inclusion details.

    smart_contracts:
      prompt: |-
        Information about deployed smart contracts, including code, interfaces (ABI),
        contract functions, upgradeability patterns, and on-chain state.

    protocol_interactions:
      prompt: |-
        Events and data related to interactions with decentralized protocols,
        including staking, lending, liquidity provision, swaps, governance voting,
        and other DeFi or on-chain application activities.

    identity_name_services:
      prompt: |-
        Information about blockchain-based identity and naming systems, including
        domain services (e.g., ENS), decentralized identifiers (DIDs), and mappings
        between human-readable names and blockchain addresses.

    infrastructure_services:
      prompt: |-
        Information about supporting infrastructure for blockchain development and operation,
        including node providers, RPC endpoints, indexing services, APIs, developer platforms,
        and middleware used to access and interact with blockchain networks.

    security_events:
      prompt: |-
        Events related to blockchain security, including key compromises, contract exploits,
        anomalous transactions, validator slashing, and other incidents affecting
        integrity and safety of assets or protocols.

    governance_mechanisms:
      prompt: |-
        Information and events related to protocol governance, including proposals,
        voting processes, token-based governance rights, upgrades, and community decisions.



professional_business_services:
  tables:
    products:
      prompt: |-
        Generate {n} realistic financial services product records.
        Cover savings accounts, loans, investment products, payment products, FX products,
        trading instruments, insurance-linked products, credit facilities.
        Descriptions: 1-3 sentences, specific and domain-accurate.
        Return a JSON array of objects with keys: name, description.
        No duplicates. Raw JSON only, no markdown.

consumer_hospitality_retail:
  tables:
    games_catalog:
      prompt: |-
        Generate {n} realistic online casino and gaming records.
        Cover slots, table games, live dealer, crash games, poker variants, bingo, lottery.
        Descriptions mention theme, mechanics, special features, volatility, jackpot type.
        Return a JSON array of objects with keys: name, description.
        No duplicates. Raw JSON only, no markdown.

other:
  tables:
    shipment_types:
      prompt: |-
        Generate {n} realistic logistics shipment type records.
        Cover air freight, ocean, road, rail, last-mile, cold chain, hazmat, oversized, express.
        Descriptions explain handling requirements, transit characteristics, regulatory considerations.
        Return a JSON array of objects with keys: name, description.
        No duplicates. Raw JSON only, no markdown.
